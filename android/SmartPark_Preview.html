<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartPark Pro Preview</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; color: #1E293B; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .phone { width: 375px; height: 812px; background: #F8FAFC; border-radius: 40px; position: relative; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.5); border: 8px solid #334155; }

        /* Splash */
        #splash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0F172A; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1); }
        .splash_logo { width: 100px; height: 100px; background: #F59E0B; border-radius: 20px; display: flex; justify-content: center; align-items: center; color: white; animation: pulse 2s infinite; }
        .splash_text { color: white; font-weight: 800; font-size: 28px; letter-spacing: 4px; margin-top: 24px; }

        /* Dashboard */
        #dashboard { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #F1F5F9; padding: 24px; display: flex; flex-direction: column; overflow-y: auto; }
        .header_bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; margin-top: 40px;}
        .stat_grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .stat_card { background: white; padding: 16px; border-radius: 16px; border: 1px solid #E2E8F0; }
        .stat_label { font-size: 11px; color: #64748B; font-weight: 600; text-transform: uppercase; }
        .stat_value { font-size: 20px; font-weight: 800; color: #1E293B; }

        .parking_list { display: flex; flex-direction: column; gap: 12px; }
        .vehicle_card { background: white; border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #E2E8F0; transition: transform 0.2s; }
        .vehicle_card:active { transform: scale(0.98); }
        .plate_box { background: #E2E8F0; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-weight: 700; font-size: 14px; border: 1px solid #94A3B8; }
        
        .fab { position: fixed; bottom: 100px; right: 40px; background: #6366F1; color: white; padding: 16px 24px; border-radius: 30px; font-weight: 700; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); cursor: pointer; z-index: 10; }
        
        .nav_bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #E2E8F0; }
        .nav_item { color: #94A3B8; font-size: 11px; font-weight: 600; }
        .nav_item.active { color: #6366F1; }
    </style>
</head>
<body>
    <div class="phone">
        <!-- Splash -->
        <div id="splash">
            <div class="splash_logo"><svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg></div>
            <div class="splash_text">SmartPark</div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard">
            <div class="header_bar">
                <span style="font-size: 26px; font-weight: 800; color: #1E293B;">Gate Dashboard</span>
                <div style="width: 36px; height: 36px; border-radius: 18px; background: #6366F1; color: white; display: flex; justify-content: center; align-items: center;">A</div>
            </div>

            <div class="stat_grid">
                <div class="stat_card">
                    <div class="stat_label">Spots Occupied</div>
                    <div class="stat_value" id="count">12</div>
                </div>
                <div class="stat_card" style="background: #EEF2FF; border-color: #6366F1;">
                    <div class="stat_label" style="color: #6366F1;">Daily Revenue</div>
                    <div class="stat_value" id="revenue" style="color: #6366F1;">$84.50</div>
                </div>
            </div>

            <div style="font-weight: 700; margin-bottom: 12px; color: #64748B; font-size: 14px;">RECENT TRANSACTIONS</div>
            <div class="parking_list" id="list">
                <div class="vehicle_card">
                    <div><div class="plate_box">PB-8274</div><div style="font-size: 11px; margin-top: 4px; color: #64748B;">Sedan Entry</div></div>
                    <div style="font-weight: 800; color: #10B981;">+$5.00</div>
                </div>
                <div class="vehicle_card">
                    <div><div class="plate_box">DL-3129</div><div style="font-size: 11px; margin-top: 4px; color: #64748B;">Heavy Truck</div></div>
                    <div style="font-weight: 800; color: #10B981;">+$15.00</div>
                </div>
            </div>
        </div>

        <div class="fab" onclick="addVehicle()">Entry Register +</div>

        <div class="nav_bar">
            <div class="nav_item active">Entrance</div>
            <div class="nav_item">Inventory</div>
            <div class="nav_item">Settings</div>
        </div>
    </div>

    <script>
        setTimeout(() => { document.getElementById('splash').style.transform = 'translateY(-100%)'; }, 2000);

        let count = 12;
        let rev = 84.50;

        // Factory + Observer Simulation
        function addVehicle() {
            count++;
            rev += 5.00;
            const plate = "PB-" + Math.floor(Math.random()*9000+1000);
            
            document.getElementById('count').innerText = count;
            document.getElementById('revenue').innerText = "$" + rev.toFixed(2);
            document.getElementById('revenue').style.color = "#EC4899"; // Observer flash
            setTimeout(() => { document.getElementById('revenue').style.color = "#6366F1"; }, 300);

            const item = document.createElement('div');
            item.className = "vehicle_card";
            item.style.animation = "fadeIn 0.5s";
            item.innerHTML = `<div><div class="plate_box">${plate}</div><div style="font-size: 11px; margin-top: 4px; color: #64748B;">New Sedan</div></div><div style="font-weight: 800; color: #10B981;">+$5.00</div>`;
            
            const list = document.getElementById('list');
            list.insertBefore(item, list.firstChild);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </script>
</body>
</html>
